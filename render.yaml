services:
  - type: web
    name: israeli-backend
    env: python
    plan: free
    buildCommand: |
      python --version
      python3.11 -m pip install --upgrade pip || python -m pip install --upgrade pip
      python3.11 -m pip install --only-binary=:all: -r requirements.txt || pip install --only-binary=:all: -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
